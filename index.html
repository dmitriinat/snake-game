<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Натокинская змейка</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; }

    body {
      background: #0a150a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      font-family: 'Press Start 2P', monospace;
      padding: 10px 8px 12px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    h1 {
      color: #a8f060;
      font-size: clamp(11px, 3.8vw, 20px);
      letter-spacing: 2px;
      margin-bottom: 8px;
      text-align: center;
      line-height: 1.5;
      text-shadow: 0 0 16px #4caf5088;
      white-space: nowrap;
    }

    #header {
      display: flex;
      justify-content: space-between;
      width: min(420px, 96vw);
      margin-bottom: 8px;
    }

    .score-box {
      background: #152515;
      border: 1px solid #2a4a2a;
      border-radius: 8px;
      padding: 5px 14px;
      text-align: center;
    }

    .score-label {
      font-size: 7px;
      color: #6a9a6a;
      margin-bottom: 3px;
    }

    .score-val {
      font-size: clamp(13px, 3.8vw, 18px);
      color: #a8f060;
    }

    #canvas-wrap {
      position: relative;
      border: 2px solid #2a4a2a;
      border-radius: 10px;
      overflow: hidden;
      line-height: 0;
      box-shadow: 0 0 24px #1a3a1a;
      width: min(420px, 96vw);
      aspect-ratio: 1;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.80);
      gap: 12px;
    }

    #overlay.hidden { display: none; }

    #ov-title {
      font-size: clamp(12px, 3.5vw, 16px);
      color: #a8f060;
      letter-spacing: 1px;
      text-align: center;
      line-height: 1.9;
      padding: 0 12px;
    }

    #ov-sub {
      font-size: clamp(7px, 2vw, 9px);
      color: #7ab87a;
      text-align: center;
      line-height: 2;
    }

    #ov-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(9px, 2.8vw, 11px);
      background: #4caf50;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 26px;
      cursor: pointer;
      margin-top: 4px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    #ov-btn:active { background: #388e3c; transform: scale(0.97); }

    #arrows {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      margin-top: 10px;
    }

    .arrow-row { display: flex; gap: 5px; }

    .arr-btn {
      font-family: 'Press Start 2P', monospace;
      width: clamp(54px, 14vw, 64px);
      height: clamp(50px, 13vw, 58px);
      background: #1a2e1a;
      border: 2px solid #3a6a3a;
      border-radius: 10px;
      font-size: clamp(18px, 5vw, 22px);
      cursor: pointer;
      color: #a8f060;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
      transition: background 0.08s, transform 0.08s, border-color 0.08s;
    }

    .arr-btn:active,
    .arr-btn.pressed {
      background: #0d1f0d;
      border-color: #6fcf3a;
      transform: scale(0.88);
    }

    #hint {
      font-size: 7px;
      color: #3a6a3a;
      margin-top: 8px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>🐍 НАТОКИНСКАЯ ЗМЕЙКА</h1>

  <div id="header">
    <div class="score-box">
      <div class="score-label">СЧЁТ</div>
      <div class="score-val" id="score">0</div>
    </div>
    <div class="score-box">
      <div class="score-label">РЕКОРД</div>
      <div class="score-val" id="best">0</div>
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="c" width="420" height="420"></canvas>
    <div id="overlay">
      <div id="ov-title">НАТОКИНСКАЯ<br>ЗМЕЙКА</div>
      <div id="ov-sub">Нажмите кнопку ниже<br>или стрелку на клавиатуре</div>
      <button id="ov-btn">▶ СТАРТ</button>
    </div>
  </div>

  <div id="arrows">
    <div class="arrow-row">
      <button class="arr-btn" id="btn-up" aria-label="Вверх">↑</button>
    </div>
    <div class="arrow-row">
      <button class="arr-btn" id="btn-left" aria-label="Влево"><span style="display:inline-block;transform:rotate(-90deg)">↑</span></button>
      <button class="arr-btn" id="btn-down" aria-label="Вниз">↓</button>
      <button class="arr-btn" id="btn-right" aria-label="Вправо"><span style="display:inline-block;transform:rotate(90deg)">↑</span></button>
    </div>
  </div>

  <div id="hint">← ↑ ↓ → клавиатура &nbsp;·&nbsp; кнопки выше для телефона</div>

  <script>
    const COLS = 21, ROWS = 21, CELL = 20;
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl  = document.getElementById('best');
    const overlay = document.getElementById('overlay');
    const ovTitle = document.getElementById('ov-title');
    const ovSub   = document.getElementById('ov-sub');
    const ovBtn   = document.getElementById('ov-btn');

    const C = {
      bg: '#0d1f0d', grid: '#152515',
      snake: '#6fcf3a', snakeHead: '#a8f060', snakeBorder: '#3a8a10',
      food: '#ff5252', foodGlow: '#ff8a80', dead: '#e57373'
    };

    let snake, dir, nextDir, food, score, best = 0, running = false, dead = false, loop;

    const DIRS = {
      UP:    { x: 0, y: -1 }, DOWN:  { x: 0, y:  1 },
      LEFT:  { x: -1, y: 0 }, RIGHT: { x:  1, y: 0 }
    };

    function rand(n) { return Math.floor(Math.random() * n); }

    function spawnFood() {
      let pos;
      do { pos = { x: rand(COLS), y: rand(ROWS) }; }
      while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function init() {
      const mid = Math.floor(COLS / 2);
      snake   = [{ x: mid, y: mid }, { x: mid-1, y: mid }, { x: mid-2, y: mid }];
      dir     = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score   = 0;
      scoreEl.textContent = '0';
      dead    = false;
      spawnFood();
      draw();
    }

    function applyDir(d) {
      if (!d) return;
      if (d.x === -dir.x && d.y === -dir.y) return;
      nextDir = d;
    }

    function step() {
      dir = { ...nextDir };
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
          snake.some(s => s.x === head.x && s.y === head.y)) {
        gameover(); return;
      }
      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = score;
        if (score > best) { best = score; bestEl.textContent = best; }
        spawnFood();
      } else { snake.pop(); }
      draw();
    }

    function gameover() {
      dead = true;
      clearInterval(loop);
      running = false;
      drawDead();
      setTimeout(() => {
        ovTitle.innerHTML = 'КОНЕЦ ИГРЫ';
        ovSub.innerHTML   = 'Счёт: ' + score + '<br>Нажмите для перезапуска';
        ovBtn.textContent = '↩ СНОВА';
        overlay.classList.remove('hidden');
      }, 400);
    }

    function startGame() {
      overlay.classList.add('hidden');
      init();
      clearInterval(loop);
      running = true;
      loop = setInterval(step, 120);
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
      ctx.quadraticCurveTo(x+w, y, x+w, y+r);
      ctx.lineTo(x+w, y+h-r);
      ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
      ctx.lineTo(x+r, y+h);
      ctx.quadraticCurveTo(x, y+h, x, y+h-r);
      ctx.lineTo(x, y+r);
      ctx.quadraticCurveTo(x, y, x+r, y);
      ctx.closePath(); ctx.fill();
    }

    function drawGrid() {
      ctx.fillStyle = C.bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = C.grid; ctx.lineWidth = 0.5;
      for (let i = 0; i <= COLS; i++) {
        ctx.beginPath(); ctx.moveTo(i*CELL, 0); ctx.lineTo(i*CELL, ROWS*CELL); ctx.stroke();
      }
      for (let j = 0; j <= ROWS; j++) {
        ctx.beginPath(); ctx.moveTo(0, j*CELL); ctx.lineTo(COLS*CELL, j*CELL); ctx.stroke();
      }
    }

    function drawSnake(color) {
      snake.forEach((seg, i) => {
        const x = seg.x*CELL, y = seg.y*CELL;
        ctx.fillStyle = i === 0 ? (dead ? C.dead : C.snakeHead) : color;
        roundRect(x+1, y+1, CELL-2, CELL-2, 4);
        if (!dead) { ctx.strokeStyle = C.snakeBorder; ctx.lineWidth = 0.5; ctx.stroke(); }
      });
    }

    function drawFood() {
      const x = food.x*CELL + CELL/2, y = food.y*CELL + CELL/2;
      ctx.fillStyle = C.food;
      ctx.beginPath(); ctx.arc(x, y, CELL/2-2, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = C.foodGlow;
      ctx.beginPath(); ctx.arc(x-2, y-2, 3, 0, Math.PI*2); ctx.fill();
    }

    function draw()     { drawGrid(); drawSnake(C.snake); drawFood(); }
    function drawDead() { drawGrid(); drawSnake(C.dead);  drawFood(); }

    const KEY_MAP = {
      ArrowUp: DIRS.UP, ArrowDown: DIRS.DOWN,
      ArrowLeft: DIRS.LEFT, ArrowRight: DIRS.RIGHT
    };

    document.addEventListener('keydown', e => {
      const d = KEY_MAP[e.key];
      if (!d) return;
      e.preventDefault();
      if (!running) { startGame(); return; }
      applyDir(d);
    });

    const BTN_DIR = {
      'btn-up': DIRS.UP, 'btn-down': DIRS.DOWN,
      'btn-left': DIRS.LEFT, 'btn-right': DIRS.RIGHT
    };

    function handleBtnPress(btn) {
      btn.classList.add('pressed');
      const d = BTN_DIR[btn.id];
      if (!running) { startGame(); if (d) applyDir(d); return; }
      applyDir(d);
    }

    function handleBtnRelease(btn) { btn.classList.remove('pressed'); }

    Object.keys(BTN_DIR).forEach(id => {
      const btn = document.getElementById(id);
      if (!btn) return;
      btn.addEventListener('mousedown',  () => handleBtnPress(btn));
      btn.addEventListener('mouseup',    () => handleBtnRelease(btn));
      btn.addEventListener('mouseleave', () => handleBtnRelease(btn));
      btn.addEventListener('touchstart', e => { e.preventDefault(); e.stopPropagation(); handleBtnPress(btn); },   { passive: false });
      btn.addEventListener('touchend',   e => { e.preventDefault(); e.stopPropagation(); handleBtnRelease(btn); }, { passive: false });
      btn.addEventListener('touchcancel',() => handleBtnRelease(btn));
    });

    ovBtn.addEventListener('click',    startGame);
    ovBtn.addEventListener('touchend', e => { e.preventDefault(); startGame(); }, { passive: false });

    /* Блокируем скролл страницы во время касания кнопок */
    document.getElementById('arrows').addEventListener('touchmove', e => e.preventDefault(), { passive: false });

    draw();
  </script>
</body>
</html>
